upstream flixify_api_backend {
    server 127.0.0.1:9199;
    keepalive 64;
}

server {
    listen 80;
    server_name api-v4.flixify.pro;

    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Credentials;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Max-Age;
    proxy_hide_header Access-Control-Expose-Headers;
    proxy_hide_header Vary;

    add_header Access-Control-Allow-Origin $flixify_api_cors_origin always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Allow-Methods "GET,POST,PUT,DELETE,OPTIONS" always;
    add_header Access-Control-Allow-Headers $http_access_control_request_headers always;
    add_header Access-Control-Max-Age 86400 always;
    add_header Access-Control-Expose-Headers "X-Request-ID,X-Api-Version,X-Release-Id" always;
    add_header Vary "Origin, Access-Control-Request-Headers" always;

    if ($request_method = OPTIONS) {
        return 204;
    }

    location ~ ^/api/v1/(stream/|m3u/logo/) {
        proxy_pass http://flixify_api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    location / {
        proxy_pass http://flixify_api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }
}
